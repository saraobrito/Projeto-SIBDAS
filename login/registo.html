<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Vila Baleira Web</title>
        <link rel="shortcut icon" href="../assets/img/logo_cores_125.png" type="image/png">
        <link rel="stylesheet" href="../assets/css/1231266_login.css">
</head>
<body class="body-auth">
    <div class="auth-container">
        <img src="../assets/img/logo_cores_125.png" alt="Logo" class="auth-logo">
        <h2>Criar Conta</h2>
        <p>Junte-se à Vila Baleira Web</p>
        
        <form action="login.html" method="POST">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Insira o seu nome" required>
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Insira o seu e-mail" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Crie uma password" required>
            </div>
            <button type="submit" class="btn-entrar">Registar</button>
        </form>
        
        <p class="auth-link">Já tem conta? <a href="login.html">Fazer Login</a></p>
    </div>
</body>
</html>
