<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital Vila Baleira</title>
        <link rel="shortcut icon" href="../assets/img/logo_cores_125.png" type="image/png">
    <link rel="stylesheet" href="../assets/css/1231266_login.css">
</head>
<body>

    <div class="login-overlay">
        <img src="../assets/img/logo_cores_125.png" alt="Logo" style="height: 60px; margin-bottom: 15px;">
        <h2>Acesso Profissional</h2>
        <p>Área reservada a funcionários e corpo clínico.</p>
        
        <form action="../private/index_private.html">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Insira o seu e-mail" required>
            </div>
            <div class="input-group">
                <label>Palavra-passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>
        <button type="submit" class="btn-entrar">Entrar</button>
    </form>
    
    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <a href="../login/registo.html" style="display: block; padding: 10px; background: #e3f2fd; color: #1976d2; text-decoration: none; border-radius: 10px; font-weight: bold; border: 1px solid #bbdefb; transition: 0.3s;">Criar Nova Conta</a>
    </div>
    
    <p class="auth-link"><a href="../public/index.html">← Voltar à página principal</a></p>
</div>
    </div>

</body>
</html>
